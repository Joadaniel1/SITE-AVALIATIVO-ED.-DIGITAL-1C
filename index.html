<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTech Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>EduTech</h1>
  <nav>
    <a href="#hero">Início</a>
    <a href="#courses">Cursos</a>
    <a href="#contact">Contato</a>
  </nav>
</header>

<!-- HERO -->
<section id="hero">
  <h2>Aprenda com estilo 🚀</h2>
  <p>Plataforma moderna e colorida</p>
  <button onclick="showToast('Bem-vindo!')">Começar</button>
</section>

<!-- CURSOS -->
<section id="courses">
  <h2>Cursos</h2>
  <div id="courseList"></div>
</section>

<!-- CARROSSEL -->
<section id="testimonials">
  <h2>Depoimentos</h2>
  <div class="carousel">
    <button onclick="prev()">◀</button>
    <div id="slide"></div>
    <button onclick="next()">▶</button>
  </div>
</section>

<!-- FORM -->
<section id="contact">
  <h2>Contato</h2>
  <form id="form">
    <input placeholder="Nome" required>
    <input placeholder="Email" required>
    <button>Enviar</button>
  </form>
</section>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
