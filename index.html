<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTech Pro Max</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ACESSIBILIDADE -->
<div class="a11y">
  <button onclick="fontSize(1)">A+</button>
  <button onclick="fontSize(-1)">A-</button>
  <button onclick="toggleContrast()">Contraste</button>
  <button onclick="toggleDark()">🌙</button>
</div>

<header id="header">
  <nav>
    <h1>EduTech</h1>
    <button id="menuBtn">☰</button>
    <ul id="menu">
      <li><a href="#cursos">Cursos</a></li>
      <li><a href="#features">Recursos</a></li>
      <li><a href="#contato">Contato</a></li>
    </ul>
  </nav>
</header>

<main>

<!-- HERO -->
<section class="hero">
  <h2>Aprenda no nível profissional</h2>
  <p>Interface moderna + experiência premium</p>
  <button onclick="openModal()">Começar</button>
</section>

<!-- TABS -->
<section>
  <div class="tabs">
    <button class="tab active" data-tab="1">Front-end</button>
    <button class="tab" data-tab="2">Back-end</button>
  </div>

  <div class="tab-content active" id="tab-1">HTML, CSS, JS</div>
  <div class="tab-content" id="tab-2">Node, APIs</div>
</section>

<!-- CURSOS -->
<section id="cursos">
  <h2>Cursos</h2>
  <div id="courses" class="grid"></div>
</section>

<!-- CARROSSEL -->
<section>
  <div class="carousel">
    <button onclick="prev()">◀</button>
    <div id="slide"></div>
    <button onclick="next()">▶</button>
  </div>
</section>

<!-- ACCORDION -->
<section>
  <button class="acc">O site é gratuito?</button>
  <div class="acc-content">Sim</div>

  <button class="acc">Tem certificado?</button>
  <div class="acc-content">Sim</div>
</section>

<!-- CONTATO -->
<section id="contato">
  <form id="form">
    <input id="name" placeholder="Nome" required>
    <input id="email" placeholder="Email" required>
    <button>Enviar</button>
  </form>
</section>

</main>

<!-- MODAL -->
<div id="modal">
  <div class="modal-content">
    <p>Bem-vindo 👋</p>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<footer>
  <p>© 2026 EduTech</p>
</footer>

<script src="script.js"></script>
</body>
</html>
