<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTech Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ACESSIBILIDADE -->
<div class="accessibility-controls">
  <button onclick="changeFontSize(1)">A+</button>
  <button onclick="changeFontSize(-1)">A-</button>
  <button onclick="toggleContrast()">Contraste</button>
  <button onclick="toggleDarkMode()">🌙</button>
</div>

<!-- HEADER -->
<header>
  <nav>
    <h1>EduTech</h1>
    <button class="menu-toggle" aria-label="Abrir menu">☰</button>
    <ul class="menu">
      <li><a href="#sobre">Sobre</a></li>
      <li><a href="#cursos">Cursos</a></li>
      <li><a href="#contato">Contato</a></li>
    </ul>
  </nav>
</header>

<main>

<!-- HERO -->
<section class="hero">
  <h2>Aprenda habilidades do futuro</h2>
  <p>Plataforma moderna com cursos acessíveis</p>
</section>

<!-- FILTRO -->
<section>
  <input type="text" id="filter" placeholder="Buscar curso...">
</section>

<!-- CURSOS -->
<section id="cursos">
  <h2>Cursos</h2>
  <div id="courses-container" class="grid"></div>
</section>

<!-- FORM -->
<section id="contato">
  <h2>Contato</h2>
  <form id="form">
    <input type="text" id="name" placeholder="Nome" required>
    <input type="email" id="email" placeholder="Email" required>
    <textarea id="msg" placeholder="Mensagem"></textarea>
    <button type="submit">Enviar</button>
  </form>
</section>

</main>

<!-- TOAST -->
<div id="toast"></div>

<footer>
  <p>© 2026 EduTech</p>
</footer>

<script src="script.js"></script>
</body>
</html>
