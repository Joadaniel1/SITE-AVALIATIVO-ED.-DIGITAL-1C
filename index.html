<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>EduTech Dev Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>EduTech</h1>

  <nav>
    <a href="#courses">Cursos</a>
    <a href="#dashboard">Dashboard</a>
  </nav>

  <div id="userArea">
    <button id="loginBtn">Entrar</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Projeto nível portfólio 🚀</h2>
  <p>Simulação de sistema real</p>
</section>

<!-- LOADING -->
<div id="loading">Carregando...</div>

<!-- CURSOS -->
<section id="courses">
  <h2>Cursos</h2>

  <input id="search" placeholder="Buscar..." />
  <select id="filter">
    <option value="">Todos</option>
    <option value="Iniciante">Iniciante</option>
    <option value="Avançado">Avançado</option>
  </select>

  <div id="courseList" class="grid"></div>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
  <h2>Dashboard</h2>

  <p id="welcome"></p>
  <p>Total favoritos: <span id="count"></span></p>

  <div id="favList" class="grid"></div>

  <button onclick="logout()">Sair</button>
</section>

<!-- LOGIN MODAL -->
<div id="loginModal">
  <div class="box">
    <h3>Login</h3>
    <input id="userInput" placeholder="Seu nome">
    <button onclick="handleLogin()">Entrar</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
