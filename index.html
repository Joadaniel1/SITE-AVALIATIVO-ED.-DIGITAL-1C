<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTech Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="container nav">
    <h1 class="logo">EduTech</h1>
    <nav>
      <a href="#features">Recursos</a>
      <a href="#courses">Cursos</a>
      <a href="#contact">Contato</a>
    </nav>
    <button id="themeToggle">🌙</button>
  </div>
</header>

<main>

<!-- HERO REALMENTE MODERNO -->
<section class="hero container">
  <div class="hero-text">
    <h2>Aprenda como um profissional</h2>
    <p>Uma plataforma moderna com experiência premium e acessível</p>
    <button class="btn">Começar agora</button>
  </div>
  <div class="hero-card">
    <h3>+10.000 alunos</h3>
    <p>Aprendendo todos os dias</p>
  </div>
</section>

<!-- FEATURES -->
<section id="features" class="container grid-3"></section>

<!-- COURSES -->
<section id="courses" class="container">
  <h2>Cursos populares</h2>
  <div id="courseList" class="grid-3"></div>
</section>

<!-- CARROSSEL -->
<section class="container">
  <h2>Depoimentos</h2>
  <div class="carousel">
    <button id="prev">◀</button>
    <div id="carouselTrack"></div>
    <button id="next">▶</button>
  </div>
</section>

<!-- FORM -->
<section id="contact" class="container">
  <h2>Fale com a gente</h2>
  <form id="form">
    <input type="text" placeholder="Nome" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Mensagem"></textarea>
    <button class="btn">Enviar</button>
  </form>
</section>

</main>

<footer>
  <p>© 2026 EduTech</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
