<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>EduTech Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>EduTech</h1>
  <nav>
    <a href="#hero">Início</a>
    <a href="#courses">Cursos</a>
    <a href="#contact">Contato</a>
  </nav>
</header>

<!-- HERO -->
<section id="hero" class="section">
  <h2>Aprenda com estilo 🚀</h2>
  <p>Plataforma moderna e funcional</p>
  <button onclick="scrollToCourses()">Explorar Cursos</button>
</section>

<!-- CURSOS -->
<section id="courses" class="section">
  <h2>Cursos</h2>

  <input id="search" placeholder="Buscar curso..." />

  <div id="courseList" class="grid"></div>
</section>

<!-- CARROSSEL -->
<section id="testimonials" class="section">
  <h2>Depoimentos</h2>
  <div class="carousel">
    <button onclick="prev()">◀</button>
    <div id="slide"></div>
    <button onclick="next()">▶</button>
  </div>
</section>

<!-- CONTATO -->
<section id="contact" class="section">
  <h2>Contato</h2>
  <form id="form">
    <input id="name" placeholder="Nome" required>
    <input id="email" placeholder="Email" required>
    <button>Enviar</button>
  </form>
</section>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <p id="modalDesc"></p>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
