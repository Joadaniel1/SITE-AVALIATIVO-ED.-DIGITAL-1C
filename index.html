<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>EduTech Pro Enterprise</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>EduTech</h1>
  <nav>
    <a href="#hero">Início</a>
    <a href="#courses">Cursos</a>
    <a href="#dashboard">Dashboard</a>
  </nav>
</header>

<!-- HERO -->
<section id="hero" class="section hero">
  <h2>Plataforma Profissional 🚀</h2>
  <p>Experiência nível empresa</p>
  <button onclick="openLogin()">Entrar</button>
</section>

<!-- MÉTRICAS -->
<section class="section stats">
  <div class="stat">+10k alunos</div>
  <div class="stat">+500 aulas</div>
  <div class="stat">98% satisfação</div>
</section>

<!-- CURSOS -->
<section id="courses" class="section">
  <h2>Cursos</h2>

  <input id="search" placeholder="Buscar..." />
  <select id="filter">
    <option value="">Todos</option>
    <option value="Iniciante">Iniciante</option>
    <option value="Avançado">Avançado</option>
  </select>

  <div id="courseList" class="grid"></div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="section">
  <h2>Seus Favoritos ⭐</h2>
  <div id="favList" class="grid"></div>
</section>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>Login</h3>
    <input id="user" placeholder="Usuário">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
